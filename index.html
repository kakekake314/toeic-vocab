<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TOEIC 単語帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
:root{
  --bg:#0F0F13; --surface:#1A1A24; --surface2:#22222F;
  --line:#2c2c3a; --text:#F2F2F7; --muted:#8a8a9a;
  --primary:#7C3AED; --primary-rgb:124,58,237;
  --good:#22C55E; --bad:#EF4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000;height:100%}
body{font-family:'Noto Sans JP',sans-serif;color:var(--text);display:flex;justify-content:center}
.mono{font-family:'Space Mono',monospace}
.app{width:100%;max-width:480px;min-height:100vh;background:var(--bg);position:relative;padding-bottom:78px;overflow-x:hidden}
.view{display:none;padding:20px 16px 8px;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

h1.title{font-size:22px;font-weight:700;margin-bottom:2px}
.sub{color:var(--muted);font-size:12px;margin-bottom:18px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.row{display:flex;align-items:center}
.between{justify-content:space-between}
.gap{gap:10px}

/* Home stats */
.streak{display:flex;align-items:center;gap:12px}
.streak .flame{font-size:34px}
.streak .num{font-size:34px;font-weight:700;line-height:1}
.streak .lbl{color:var(--muted);font-size:12px}
.todaybox{display:flex;gap:10px;margin-top:14px}
.todaybox .t{flex:1;background:var(--surface2);border-radius:12px;padding:12px;text-align:center}
.todaybox .t .v{font-size:24px;font-weight:700}
.todaybox .t .l{font-size:11px;color:var(--muted);margin-top:2px}

.bar{height:9px;background:var(--surface2);border-radius:99px;overflow:hidden}
.bar > i{display:block;height:100%;background:var(--primary);border-radius:99px;transition:width .5s ease}
.proglabel{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin:0 0 8px}
.seclist{display:flex;flex-direction:column;gap:11px}
.secrow .sl{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}

.badges{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.badge{background:var(--surface2);border-radius:14px;padding:12px 6px;text-align:center;border:1px solid transparent;opacity:.38;transition:.3s}
.badge.on{opacity:1;border-color:rgba(var(--primary-rgb),.5);box-shadow:0 0 0 1px rgba(var(--primary-rgb),.15) inset}
.badge .ic{font-size:26px;filter:grayscale(1)}
.badge.on .ic{filter:none}
.badge .bn{font-size:10px;margin-top:4px;font-weight:700}
.badge .bc{font-size:9px;color:var(--muted)}

.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:14px;
  background:var(--primary);color:#fff;font-family:inherit;font-weight:700;font-size:16px;padding:16px;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--surface2);color:var(--text)}
.btn.sm{padding:11px;font-size:14px}
.btn.danger{background:rgba(239,68,68,.15);color:#ff6b6b}

/* Study */
.sessbar{margin-bottom:16px}

/* --- Level-based card animations --- */
@keyframes qcard-lv1{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes qcard-lv2{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
@keyframes qcard-lv3{0%{opacity:0;transform:translateY(18px) scale(.95)}70%{transform:translateY(-4px) scale(1.01)}100%{opacity:1;transform:none}}
@keyframes qcard-lv4{0%{opacity:0;transform:scale(.92)}60%{transform:scale(1.03)}100%{opacity:1;transform:none}}
@keyframes qcard-review{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
@keyframes border-pulse{0%,100%{box-shadow:0 0 0 0 rgba(var(--primary-rgb),.5)}50%{box-shadow:0 0 0 5px rgba(var(--primary-rgb),0)}}
@keyframes gold-shimmer{0%,100%{box-shadow:0 0 10px 2px rgba(250,200,50,.15),0 0 0 1.5px rgba(250,200,50,.35)}50%{box-shadow:0 0 22px 6px rgba(250,200,50,.30),0 0 0 1.5px rgba(250,200,50,.70)}}

.qcard{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:26px 18px;text-align:center;min-height:150px;display:flex;flex-direction:column;justify-content:center;gap:14px}
/* lv1: gentle fade-up */
.qcard.lv1{animation:qcard-lv1 .35s ease both}
/* lv2: fade-up + subtle glow border */
.qcard.lv2{animation:qcard-lv2 .35s ease both;border-color:rgba(var(--primary-rgb),.45)}
/* lv3: bounce + pulsing border */
.qcard.lv3{animation:qcard-lv3 .45s cubic-bezier(.34,1.56,.64,1) both,border-pulse 2s ease-in-out 0.5s infinite;border-color:rgba(var(--primary-rgb),.7)}
/* lv4: scale-pop + gold shimmer */
.qcard.lv4{animation:qcard-lv4 .4s cubic-bezier(.34,1.56,.64,1) both,gold-shimmer 2.5s ease-in-out 0.5s infinite;border-color:rgba(250,200,50,.5);background:linear-gradient(145deg,var(--surface),rgba(250,200,50,.06))}
/* review: slide from left */
.qcard.review{animation:qcard-review .3s ease both;border-color:rgba(var(--primary-rgb),.3);border-left:3px solid var(--primary)}
.qmean{font-size:26px;font-weight:700}
.qex{font-size:15px;color:#c8c8d4;line-height:1.7;font-family:'Space Mono',monospace}
.qex .blank{color:var(--primary);font-weight:700;letter-spacing:1px}
.hintbox{font-family:'Space Mono',monospace;font-size:20px;letter-spacing:6px;color:var(--primary);min-height:26px}
.qbtns{display:flex;gap:10px;margin:14px 0}
.qbtns .btn{font-size:13px;padding:12px}
.choices{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.choice{font-family:'Space Mono',monospace;font-size:17px;background:var(--surface);border:1.5px solid var(--line);color:var(--text);
  border-radius:14px;padding:16px;cursor:pointer;text-align:center;font-weight:700;transition:.15s}
.choice:active{transform:scale(.98)}
.choice.correct{border-color:var(--good);background:rgba(34,197,94,.13);color:#6ee79e}
.choice.wrong{border-color:var(--bad);background:rgba(239,68,68,.12);color:#ff8585}
.choice.dim{opacity:.4}
.fb{text-align:center;font-weight:700;font-size:18px;margin:0 0 8px}
.fb.ok{color:var(--good)} .fb.ng{color:var(--bad)}
.tips{background:rgba(var(--primary-rgb),.1);border:1px solid rgba(var(--primary-rgb),.3);border-radius:14px;padding:12px;margin-bottom:10px;font-size:13px;line-height:1.7}
.tips .th{font-size:11px;color:var(--primary);font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.tips .ans{font-family:'Space Mono',monospace;font-weight:700;color:var(--text)}
.feedback-panel{position:fixed;bottom:60px;left:0;right:0;background:var(--bg);border-top:1px solid var(--line);padding:14px 20px 10px;z-index:50;display:none}
.feedback-panel.show{display:block}

.result{text-align:center;padding:30px 10px}
.result .emoji{font-size:64px}
.result .rate{font-size:48px;font-weight:700;font-family:'Space Mono',monospace;margin:8px 0}
.result .rl{color:var(--muted);margin-bottom:20px}

.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px;line-height:1.8}
.empty i{font-size:40px;display:block;margin-bottom:12px;opacity:.5}

/* Words */
.searchbar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:12px}
.searchbar i{color:var(--muted)}
.searchbar input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:inherit;font-size:15px}
.tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.tab{white-space:nowrap;font-size:12px;padding:8px 14px;border-radius:99px;background:var(--surface2);color:var(--muted);cursor:pointer;border:none;font-family:inherit;font-weight:500}
.tab.on{background:var(--primary);color:#fff}
.wlist{display:flex;flex-direction:column;gap:8px}
.witem{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.witem .wt{flex:1;min-width:0}
.witem .we{font-family:'Space Mono',monospace;font-weight:700;font-size:16px}
.witem .wm{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lvbadge{font-size:10px;font-weight:700;padding:4px 8px;border-radius:99px;white-space:nowrap}
.lv0{background:#33333f;color:#9a9aaa}
.lv1,.lv2,.lv3{background:rgba(var(--primary-rgb),.18);color:var(--primary)}
.lv4{background:rgba(34,197,94,.16);color:#5fd98a}
.wdel{background:none;border:none;color:#555;font-size:18px;cursor:pointer;padding:4px}
.wdel:active{color:var(--bad)}
.countnote{text-align:center;color:var(--muted);font-size:11px;margin:14px 0 4px}

/* Calendar */
.cal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-h .m{font-weight:700;font-size:16px}
.cal-nav{background:var(--surface2);border:none;color:var(--text);width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;width:100%;overflow:hidden}
.cal-dow{text-align:center;font-size:10px;color:var(--muted);padding:2px 0}
.cal-cell{border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;background:var(--surface2);padding:6px 2px;min-height:40px;overflow:hidden}
.cal-cell.empty{background:transparent}
.cal-cell.done{color:#fff;font-weight:700}
.cal-cell .cc{font-size:9px;opacity:.8}
.cal-cell.today{outline:2px solid var(--primary)}

/* Settings */
.setrow{margin-bottom:12px}
.setrow .sk{font-size:13px;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.seg{display:flex;gap:6px}
.seg button{flex:1;background:var(--surface2);border:1px solid transparent;color:var(--muted);font-family:inherit;font-weight:700;border-radius:10px;padding:11px;cursor:pointer;font-size:14px}
.seg button.on{background:rgba(var(--primary-rgb),.18);border-color:var(--primary);color:var(--text)}
.colors{display:flex;gap:10px;flex-wrap:wrap}
.col{width:38px;height:38px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s}
.col.on{border-color:#fff;transform:scale(1.08)}
.field{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:12px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;outline:none}
.note{font-size:11px;color:var(--muted);line-height:1.6;margin-top:6px}

/* Tab bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:70px;
  background:rgba(18,18,24,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:flex;z-index:50}
.tabbar button{flex:1;background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-family:inherit}
.tabbar button i{font-size:23px}
.tabbar button span{font-size:10px}
.tabbar button.on{color:var(--primary)}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal.show{display:flex}
.sheet{width:100%;max-width:480px;background:var(--surface);border-radius:22px 22px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom));animation:up .25s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{font-size:18px;margin-bottom:16px}
.sheet label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px}
.sheet input{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:13px;color:var(--text);font-family:inherit;font-size:15px;outline:none;margin-bottom:14px}
.sheet input:focus{border-color:var(--primary)}
.fab{position:fixed;bottom:84px;left:50%;margin-left:calc(240px - 70px);transform:translateX(0);z-index:40}
.fab button{width:54px;height:54px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:26px;box-shadow:0 6px 18px rgba(var(--primary-rgb),.45);cursor:pointer;display:flex;align-items:center;justify-content:center}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--line);color:var(--text);padding:11px 18px;border-radius:99px;font-size:13px;z-index:200;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.section-title{font-size:13px;font-weight:700;color:var(--muted);margin:4px 2px 10px;text-transform:uppercase;letter-spacing:.5px}
</style>
</head>
<body>
<div class="app">

  <!-- HOME -->
  <section class="view active" id="v-home">
    <h1 class="title">TOEIC 単語帳</h1>
    <div class="sub" id="home-date"></div>

    <div class="card">
      <div class="streak" id="streak-area">
        <div class="flame" id="streak-icon">🔥</div>
        <div>
          <div class="num mono" id="streak-num">0</div>
          <div class="lbl" id="streak-lbl">日連続学習中</div>
        </div>
      </div>
      <div id="phoenix-bar" style="display:none;margin-top:10px"></div>
      <div class="todaybox">
        <div class="t"><div class="v mono" id="t-new">0</div><div class="l">今日の新規</div></div>
        <div class="t"><div class="v mono" id="t-rev">0</div><div class="l">今日の復習</div></div>
      </div>
    </div>

    <button class="btn" id="start-btn"><i class="ti ti-player-play-filled"></i> 学習を始める</button>
    <div style="height:8px"></div>
  </section>

  <!-- STUDY -->
  <section class="view" id="v-study"></section>

  <!-- WORDS -->
  <section class="view" id="v-words">
    <h1 class="title">単語管理</h1>
    <div class="sub" id="words-count"></div>
    <div class="searchbar"><i class="ti ti-search"></i><input id="search" placeholder="英単語・日本語で検索"></div>
    <div class="tabs" id="wfilters">
      <button class="tab on" data-f="all">すべて</button>
      <button class="tab" data-f="learning">学習中</button>
      <button class="tab" data-f="mastered">習得済み</button>
      <button class="tab" data-f="new">未学習</button>
    </div>
    <div class="wlist" id="wlist"></div>
    <div style="height:30px"></div>
  </section>

  <!-- PROGRESS -->
  <section class="view" id="v-progress">
    <h1 class="title">進捗</h1>
    <div class="sub">学習の積み重ねを確認しましょう</div>

    <div class="card">
      <div class="proglabel"><span>全体の習得状況</span><span id="p-ov-text">0 / 0</span></div>
      <div class="bar"><i id="p-ov-bar" style="width:0%"></i></div>
      <div style="height:16px"></div>
      <div class="proglabel"><span>セクション別</span></div>
      <div class="seclist" id="p-sec-list"></div>
    </div>

    <div class="section-title">バッジコレクション</div>
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">習得語数</div>
      <div class="badges" id="prog-badges"></div>
    </div>

    <div class="section-title">連続学習バッジ</div>
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">最大連続記録：<span id="max-streak-label" class="mono">0</span> 日</div>
      <div class="badges" id="streak-badges"></div>
    </div>

    <div class="section-title">学習カレンダー</div>
    <div class="card">
      <div class="cal-h">
        <button class="cal-nav" id="cal-prev"><i class="ti ti-chevron-left"></i></button>
        <div class="m mono" id="cal-month"></div>
        <button class="cal-nav" id="cal-next"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div style="height:20px"></div>
  </section>

  <!-- SETTINGS -->
  <section class="view" id="v-settings">
    <h1 class="title">設定</h1>
    <div class="sub">アプリの動作をカスタマイズ</div>

    <div class="card">
      <div class="setrow">
        <div class="sk"><i class="ti ti-plus"></i> 1日の新規単語数</div>
        <div class="seg" id="seg-new">
          <button data-n="5">5</button><button data-n="10">10</button>
          <button data-n="15">15</button><button data-n="20">20</button>
        </div>
      </div>
      <div class="setrow">
        <div class="sk"><i class="ti ti-refresh"></i> 1日の復習上限</div>
        <div class="seg" id="seg-rev">
          <button data-n="0">なし</button><button data-n="20">20</button>
          <button data-n="30">30</button><button data-n="50">50</button>
        </div>
        <div class="note">復習が溜まったとき、1セッションに出題される復習語数を制限します（期日が近い順に優先）。</div>
      </div>
      <div class="setrow">
        <div class="sk"><i class="ti ti-palette"></i> プライマリーカラー</div>
        <div class="colors" id="colors"></div>
      </div>
    </div>

    <div class="card">
      <button class="btn ghost sm" id="export-btn"><i class="ti ti-download"></i> データをエクスポート（JSON）</button>
      <div style="height:10px"></div>
      <button class="btn ghost sm" id="import-btn"><i class="ti ti-upload"></i> データをインポート（JSON）</button>
      <input type="file" id="import-file" accept=".json,application/json" style="display:none">
      <div style="height:10px"></div>
      <button class="btn danger sm" id="reset-btn"><i class="ti ti-trash"></i> 学習データをリセット</button>
      <div class="note" id="storage-note"></div>
    </div>
    <div style="height:20px"></div>
  </section>

  <!-- FAB (words only) -->
  <div class="fab" id="fab" style="display:none"><button id="add-fab"><i class="ti ti-plus"></i></button></div>

  <!-- Tab bar -->
  <nav class="tabbar" id="tabbar">
    <button class="on" data-v="home"><i class="ti ti-home"></i><span>ホーム</span></button>
    <button data-v="study"><i class="ti ti-school"></i><span>学習</span></button>
    <button data-v="words"><i class="ti ti-list-search"></i><span>単語</span></button>
    <button data-v="progress"><i class="ti ti-chart-bar"></i><span>進捗</span></button>
    <button data-v="settings"><i class="ti ti-settings"></i><span>設定</span></button>
  </nav>
</div>

<!-- Add word modal -->
<div class="modal" id="modal-add">
  <div class="sheet">
    <h3>単語を追加</h3>
    <label>英単語 *</label>
    <input id="in-word" autocomplete="off" spellcheck="false" placeholder="例：negotiate">
    <label>日本語訳 *</label>
    <input id="in-mean" placeholder="例：交渉する">
    <label>メモ（任意）</label>
    <input id="in-note" placeholder="例：商談でよく使う">
    <div class="row gap">
      <button class="btn ghost sm" id="add-cancel">キャンセル</button>
      <button class="btn sm" id="add-save">追加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ============ Seed data: 金フレ 700語（英単語＋標準訳） ============ */
const SEED=`provide|提供する
local|地元の
purchase|購入する／購入
opening|空き・開店
construction|建設
tour|見学・ツアー
research|調査・研究
attend|出席する
delivery|配達
recently|最近
indicate|示す
employee|従業員
additional|追加の
survey|調査・アンケート
review|見直す・批評
production|生産
located|位置する
detail|詳細
announce|発表する
repair|修理する
increase|増加する・増やす
include|含む
currently|現在
advertising|広告
charge|請求する・料金
expect|予期する
firm|会社・確固たる
client|顧客
financial|財務の
annual|年次の
payment|支払い
budget|予算
application|申込・応用
contract|契約
management|経営・管理
performance|業績・公演
pleased|喜んで
confirm|確認する
award|賞・授与する
clothing|衣類

const KEY="toeicVocab_v1";
let memStore=null, lsOK=true;
function loadRaw(){
  try{ const v=localStorage.getItem(KEY); return v; }
  catch(e){ lsOK=false; return memStore; }
}
function saveRaw(v){
  try{ localStorage.setItem(KEY,v); }
  catch(e){ lsOK=false; memStore=v; }
}

let state;
function seedWords(){
  return SEED.trim().split("\n").map((line,i)=>{
    const p=line.split("|");
    return {word:p[0].trim(),meaning:(p[1]||"").trim(),note:"",level:0,nextReview:0,idx:i,example:"",tips:""};
  });
}
function defaultState(){
  return {words:seedWords(),dailyLog:{},settings:{newPerDay:10,primary:"#7C3AED",primaryRgb:"124,58,237"},phoenixStreak:0};
}
function load(){
  const raw=loadRaw();
  if(!raw){ state=defaultState(); save(); return; }
  try{
    const o=JSON.parse(raw);
    state=defaultState();
    if(Array.isArray(o.words)&&o.words.length) state.words=o.words.map((w,i)=>({note:"",example:"",tips:"",idx:i,...w}));
    if(o.dailyLog) state.dailyLog=o.dailyLog;
    if(o.settings) state.settings={...state.settings,...o.settings};
    if(typeof o.phoenixStreak==="number") state.phoenixStreak=o.phoenixStreak;
    const cc=COLORS.find(c=>c.c===state.settings.primary);
    if(cc) state.settings.primaryRgb=cc.rgb;
  }catch(e){ state=defaultState(); }
}
function save(){ saveRaw(JSON.stringify(state)); }

/* ============ Helpers ============ */
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const pad=n=>String(n).padStart(2,"0");
const dateKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);}

function masteredCount(){return state.words.filter(w=>w.level>=4).length;}
function learningCount(){return state.words.filter(w=>w.level>=1&&w.level<4).length;}
function sectionCount(){return Math.min(7,Math.max(1,Math.ceil(state.words.length/100)));}
function streakDays(){
  let s=0,d=new Date();
  const has=dd=>{const l=state.dailyLog[dateKey(dd)];return l&&l.count>0;};
  if(!has(d)) d.setDate(d.getDate()-1);
  while(has(d)){s++;d.setDate(d.getDate()-1);}
  return s;
}
/* 最大連続記録（全dailyLogから計算） */
function maxStreakDays(){
  const keys=Object.keys(state.dailyLog).filter(k=>state.dailyLog[k].count>0).sort();
  if(!keys.length) return 0;
  let max=1,cur=1;
  for(let i=1;i<keys.length;i++){
    const prev=new Date(keys[i-1]),curr=new Date(keys[i]);
    const diff=(curr-prev)/DAY;
    if(diff===1){cur++;if(cur>max)max=cur;}
    else cur=1;
  }
  return max;
}
/* フェニックス状態を更新（学習完了後に呼ぶ） */
function updatePhoenix(){
  const s=streakDays();
  if(s>0){
    // 連続中ならphoenixをリセット
    state.phoenixStreak=0;
  } else {
    // 昨日学習したか確認
    const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yKey=dateKey(yesterday);
    const dayBefore=new Date(); dayBefore.setDate(dayBefore.getDate()-2);
    const dbKey=dateKey(dayBefore);
    const hadStreak=state.dailyLog[yKey]&&state.dailyLog[yKey].count>0&&
                    state.dailyLog[dbKey]&&state.dailyLog[dbKey].count>0;
    // 途切れた直後のみphoenixを起動（既にphoenix中でなければ）
    if(state.phoenixStreak===0 && hadStreak) state.phoenixStreak=1;
  }
}
/* フェニックス期間中の連続日数（今日含む） */
function phoenixDays(){
  if(state.phoenixStreak<=0) return 0;
  let s=0,d=new Date();
  const has=dd=>{const l=state.dailyLog[dateKey(dd)];return l&&l.count>0;};
  // 今日から連続で何日続いているか
  while(has(d)){s++;d.setDate(d.getDate()-1);}
  return s;
}
function todayLog(){const k=dateKey(new Date());return state.dailyLog[k]||{count:0,newCount:0,reviewCount:0};}

/* ============ Navigation ============ */
let current="home";
function go(v){
  current=v;
  $$(".view").forEach(el=>el.classList.remove("active"));
  $("#v-"+v).classList.add("active");
  $$("#tabbar button").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  $("#fab").style.display=(v==="words")?"block":"none";
  window.scrollTo(0,0);
  if(v!=="study"){ const p=$("#feedback-panel"); if(p) p.className="feedback-panel"; }
  if(v==="home") renderHome();
  if(v==="words") renderWords();
  if(v==="progress") renderProgress();
  if(v==="settings") renderSettings();
  if(v==="study"){ if(session) renderQuestion(); else renderStudyEntry(); }
}
$$("#tabbar button").forEach(b=>b.onclick=()=>go(b.dataset.v));

/* ============ Home ============ */
function renderHome(){
  const now=new Date();
  $("#home-date").textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
  const s=streakDays();
  const pb=$("#phoenix-bar");
  if(s>0){
    // 通常の連続中
    $("#streak-icon").textContent="🔥";
    $("#streak-num").textContent=s;
    $("#streak-lbl").textContent="日連続学習中";
    pb.style.display="none";
    state.phoenixStreak=0;
  } else if(state.phoenixStreak>0){
    // フェニックス期間中
    const pDays=phoenixDays();
    const PHOENIX_NEED=3;
    $("#streak-icon").textContent="🪶";
    $("#streak-num").textContent=pDays;
    $("#streak-lbl").textContent=`日 — 復活まであと${Math.max(0,PHOENIX_NEED-pDays)}日！`;
    pb.style.display="block";
    const pct=Math.min(100,Math.round(pDays/PHOENIX_NEED*100));
    pb.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px"><span>🪶 フェニックス復活チャレンジ</span><span>${pDays}/${PHOENIX_NEED}日</span></div><div class="bar"><i style="width:${pct}%;background:linear-gradient(90deg,#a78bfa,#7c3aed)"></i></div>`;
  } else {
    // 0日・phoenix未起動
    $("#streak-icon").textContent="🔥";
    $("#streak-num").textContent=0;
    $("#streak-lbl").textContent="日連続学習中";
    pb.style.display="none";
  }
  const tl=todayLog();
  $("#t-new").textContent=tl.newCount;
  $("#t-rev").textContent=tl.reviewCount;
}
function renderProgressBlocks(barSel,textSel,secSel){
  const total=state.words.length, mastered=masteredCount(), learning=learningCount();
  const pctMastered=total?Math.round(mastered/total*100):0;
  const pctLearning=total?Math.round(learning/total*100):0;
  // バーを2色で表示（習得済み＋学習中）
  const barEl=$(barSel);
  barEl.style.width=(pctMastered+pctLearning)+"%";
  barEl.style.background=`linear-gradient(to right, var(--good) ${pctMastered}%, var(--primary) ${pctMastered}%)`;
  $(textSel).textContent=`習得 ${mastered} ／ 学習中 ${learning} ／ 全 ${total} 語`;
  const secs=sectionCount(); let html="";
  for(let i=0;i<secs;i++){
    const from=i*100, to=Math.min((i+1)*100,total);
    const list=state.words.filter(w=>w.idx>=from&&w.idx<to);
    const m=list.filter(w=>w.level>=4).length;
    const l=list.filter(w=>w.level>=1&&w.level<4).length;
    const pM=list.length?Math.round(m/list.length*100):0;
    const pL=list.length?Math.round(l/list.length*100):0;
    const barStyle=`background:linear-gradient(to right, var(--good) ${pM}%, var(--primary) ${pM}%, var(--primary) ${pM+pL}%, var(--surface2) ${pM+pL}%)`;
    html+=`<div class="secrow"><div class="sl"><span>セクション ${i+1}（${from+1}〜${to}）</span><span>習得 ${m}・学習中 ${l}／${list.length}</span></div><div class="bar"><i style="width:${pM+pL}%;${barStyle}"></i></div></div>`;
  }
  $(secSel).innerHTML=html;
}

/* ============ Study session ============ */
let session=null;
function buildSession(){
  const now=Date.now();
  const tl=todayLog();
  const quota=Math.max(0,state.settings.newPerDay-tl.newCount);
  const newWords=state.words.filter(w=>w.nextReview===0).sort((a,b)=>a.idx-b.idx).slice(0,quota);
  let reviewWords=state.words.filter(w=>w.nextReview>0&&w.nextReview<=now).sort((a,b)=>a.nextReview-b.nextReview);
  const cap=state.settings.reviewCap||0;
  if(cap>0) reviewWords=reviewWords.slice(0,cap);
  const queue=shuffle([
    ...newWords.map(w=>({w,type:"new"})),
    ...reviewWords.map(w=>({w,type:"review"}))
  ]);
  return queue;
}
function startSession(){
  const q=buildSession();
  if(q.length===0){ session=null; go("study"); return; }
  session={queue:q,i:0,correct:0,firstTotal:q.length,answered:false,reqId:0};
  go("study");
}
function renderStudyEntry(){
  const now=Date.now();
  const tl=todayLog();
  const quota=Math.max(0,state.settings.newPerDay-tl.newCount);
  const newAvail=Math.min(quota,state.words.filter(w=>w.nextReview===0).length);
  const revRaw=state.words.filter(w=>w.nextReview>0&&w.nextReview<=now).length;
  const cap=state.settings.reviewCap||0;
  const revAvail=cap>0?Math.min(cap,revRaw):revRaw;
  const v=$("#v-study");
  if(newAvail+revAvail===0){
    v.innerHTML=`<h1 class="title">学習</h1><div class="empty"><i class="ti ti-circle-check"></i>今日の学習は完了しています！<br>新しい単語の追加や、明日の復習をお待ちください。</div>`;
    return;
  }
  v.innerHTML=`<h1 class="title">学習</h1><div class="sub">今日のセッション</div>
  <div class="card"><div class="row between" style="margin-bottom:12px"><span>新規単語</span><span class="mono" style="font-weight:700;color:var(--primary)">${newAvail} 語</span></div>
  <div class="row between"><span>復習単語</span><span class="mono" style="font-weight:700;color:var(--primary)">${revAvail} 語${cap>0&&revRaw>cap?`（全 ${revRaw} 語中）`:""}</span></div></div>
  <button class="btn" id="study-start"><i class="ti ti-player-play-filled"></i> 開始（全 ${newAvail+revAvail} 問）</button>`;
  $("#study-start").onclick=()=>startSession();
}

function escReg(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
function maskedExample(item){
  const w=item.w;
  if(w.example){
    return w.example.replace(new RegExp(escReg(w.word),"gi"),'<span class="blank">?????</span>');
  }
  const prompts=["この意味の単語は？ → <span class='blank'>?????</span>",
                 "正しい単語を選びましょう → <span class='blank'>?????</span>",
                 "下の意味に合う語は → <span class='blank'>?????</span>"];
  return prompts[w.idx%prompts.length];
}

function detectAffix(word){
  const w=word.toLowerCase();
  for(const [p,pm] of PRE){
    if(w.length>=p.length+4 && w.startsWith(p)){
      const rem=w.slice(p.length);
      for(const [r,rm] of ROOT){
        if(rem.startsWith(r)){
          const tail=rem.slice(r.length);
          if(SUF.has(tail)) return p+"("+pm+")＋"+r+"("+rm+")";
        }
      }
    }
  }
  return null;
}
function suffixNote(word){
  const w=word.toLowerCase();
  const map=[["tion","語尾 -tion は動作・状態を表す名詞"],["sion","語尾 -sion は名詞をつくる"],["ment","語尾 -ment は結果・手段の名詞"],["ance","語尾 -ance は名詞をつくる"],["ence","語尾 -ence は名詞をつくる"],["able","語尾 -able は「〜できる」"],["ible","語尾 -ible は「〜できる」"],["ize","語尾 -ize は「〜にする」動詞"],["ify","語尾 -ify は「〜化する」動詞"],["ous","語尾 -ous は「〜の多い」形容詞"],["ive","語尾 -ive は「〜的な」形容詞"],["ity","語尾 -ity は性質を表す名詞"],["ical","語尾 -ical は「〜の」形容詞"],["ly","語尾 -ly は副詞をつくる"]];
  for(const [s,note] of map){ if(w.endsWith(s)&&w.length>s.length+2) return note; }
  return null;
}
const GENERIC=[
 "{w}：{m}。例文の文脈ごと声に出すと定着しやすいです。",
 "{w}：{m}。今日のうちにもう一度思い出してみましょう。",
 "{w}：{m}。似た意味の語と関連づけると忘れにくくなります。",
 "{w}：{m}。TOEIC頻出。Part5・7で要チェックの一語です。",
 "{w}：{m}。発音とアクセントもあわせて確認しましょう。",
 "{w}：{m}。一度書き出すと記憶に残りやすくなります。"
];
function localTip(w){
  const key=w.word.toLowerCase();
  if(ETYM[key]) return "語源："+ETYM[key];
  const af=detectAffix(key);
  if(af) return "語源："+af+"→「"+w.meaning+"」";
  const sn=suffixNote(key);
  if(sn) return w.meaning+"。"+sn+"。意味とセットで覚えましょう。";
  return GENERIC[w.idx%GENERIC.length].replace("{w}",w.word).replace("{m}",w.meaning);
}

function makeChoices(w){
  const others=state.words.filter(x=>x.word!==w.word);
  const sameFirst=shuffle(others.filter(x=>x.word[0].toLowerCase()===w.word[0].toLowerCase()));
  let pool=sameFirst.slice(0,3);
  if(pool.length<3){
    const rest=shuffle(others.filter(x=>!pool.includes(x)));
    pool=pool.concat(rest.slice(0,3-pool.length));
  }
  let choices=pool.map(x=>x.word);
  const dummy=["manage","submit","approve","arrange","prepare","confirm","release","propose"];
  while(choices.length<3){const d=dummy[(Math.random()*dummy.length)|0];if(d!==w.word&&!choices.includes(d))choices.push(d);}
  choices.push(w.word);
  return shuffle(choices);
}

function renderQuestion(){
  const v=$("#v-study");
  const item=session.queue[session.i];
  const w=item.w;
  session.answered=false;
  session.choices=makeChoices(w);
  const total=session.queue.length;
  const progress=Math.round(session.i/total*100);
  v.innerHTML=`
    <div class="sessbar">
      <div class="proglabel"><span>問題 ${session.i+1} / ${total}</span><span>${item.type==="new"?"新規":"復習"}・Lv.${w.level}</span></div>
      <div class="bar"><i style="width:${progress}%"></i></div>
    </div>
    <div class="qcard ${item.type==="review"?"review":w.level>=1?"lv"+w.level:""}">
      <div class="qmean">${esc(w.meaning)}</div>
      <div class="qex" id="qex">${maskedExample(item)}</div>
      <div class="hintbox" id="hintbox"></div>
    </div>
    <div class="qbtns">
      <button class="btn ghost sm" id="hint-btn"><i class="ti ti-bulb"></i> ヒント</button>
      <button class="btn ghost sm" id="show-btn"><i class="ti ti-list-check"></i> 選択肢を見る</button>
    </div>
    <div class="choices" id="choices" style="display:none"></div>
    <div id="feedback-spacer" style="display:none;height:200px"></div>
  `;
  // fixed feedback panel（既存があれば再利用、なければ作成）
  let panel=$("#feedback-panel");
  if(!panel){
    panel=document.createElement("div");
    panel.id="feedback-panel";
    panel.className="feedback-panel";
    document.body.appendChild(panel);
  }
  panel.className="feedback-panel";
  panel.innerHTML="";
  $("#hint-btn").onclick=()=>{$("#hintbox").textContent=w.word[0].toUpperCase()+" "+"· ".repeat(Math.max(0,w.word.length-1)).trim();};
  $("#show-btn").onclick=showChoices;
}
function showChoices(){
  const box=$("#choices");
  if(box.style.display!=="none") return;
  box.style.display="flex";
  box.innerHTML=session.choices.map(c=>`<button class="choice" data-c="${esc(c)}">${esc(c)}</button>`).join("");
  $$("#choices .choice").forEach(btn=>btn.onclick=()=>answer(btn.dataset.c,btn));
}
function answer(choice,btn){
  if(session.answered) return;
  session.answered=true;
  const item=session.queue[session.i];
  const w=item.w;
  const correct=choice===w.word;
  // 初回回答のみレベル・ログを更新（再挑戦は練習扱い）
  if(!item.retry){
    const newLevel=correct?Math.min(4,w.level+1):Math.max(0,w.level-1);
    w.level=newLevel;
    w.nextReview=Date.now()+(INTERVAL[newLevel]||1)*DAY;
    const k=dateKey(new Date());
    const l=state.dailyLog[k]||{count:0,newCount:0,reviewCount:0};
    l.count++; if(item.type==="new") l.newCount++; else l.reviewCount++;
    state.dailyLog[k]=l;
    if(correct) session.correct++;
    updatePhoenix();
    save();
  }
  // 不正解はセッション末尾に再キュー（正解するまで繰り返し）
  if(!correct){
    session.queue.push({w,type:item.type,retry:true});
  }
  // UI
  $$("#choices .choice").forEach(b=>{
    b.style.pointerEvents="none";
    if(b.dataset.c===w.word) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  // reveal full example
  const qe=$("#qex");
  if(w.example) qe.innerHTML=w.example.replace(new RegExp(escReg(w.word),"gi"),`<span style="color:var(--primary);font-weight:700">${esc(w.word)}</span>`);
  $("#hintbox").textContent="";
  const tip=localTip(w);
  const fb=$("#feedback-panel");
  const okMsg=item.retry?"<i class='ti ti-circle-check'></i> 正解！克服しました":"<i class='ti ti-circle-check'></i> 正解！";
  const ngMsg="<i class='ti ti-circle-x'></i> 不正解（このセッションの最後にもう一度出題されます）";
  fb.innerHTML=`
    <div class="fb ${correct?"ok":"ng"}">${correct?okMsg:ngMsg}</div>
    <div class="tips">
      <div class="th"><i class="ti ti-sparkles"></i> 答え：<span class="ans">${esc(w.word)}</span> ＝ ${esc(w.meaning)}</div>
      ${esc(tip)}
    </div>
    <button class="btn" id="next-btn">${session.i+1>=session.queue.length?"結果を見る":"次の問題"} <i class="ti ti-arrow-right"></i></button>
  `;
  fb.className="feedback-panel show";
  const spacer=$("#feedback-spacer");
  if(spacer) spacer.style.display="block";
  $("#next-btn").onclick=next;
}
function next(){
  const panel=$("#feedback-panel");
  if(panel) panel.className="feedback-panel";
  const spacer=$("#feedback-spacer");
  if(spacer) spacer.style.display="none";
  session.i++;
  if(session.i>=session.queue.length){ showResult(); }
  else renderQuestion();
}
function showResult(){
  const total=session.firstTotal;
  const rate=total?Math.round(session.correct/total*100):0;
  const emoji=rate>=90?"🎉":rate>=70?"👍":"💪";
  const v=$("#v-study");
  v.innerHTML=`
    <div class="result">
      <div class="emoji">${emoji}</div>
      <div class="rate mono">${rate}%</div>
      <div class="rl">${total}問中 ${session.correct}問 正解（初回回答ベース）</div>
      <button class="btn" id="res-home"><i class="ti ti-home"></i> ホームに戻る</button>
      <div style="height:10px"></div>
      <button class="btn ghost" id="res-again"><i class="ti ti-refresh"></i> もう一度学習する</button>
    </div>`;
  session=null;
  $("#res-home").onclick=()=>go("home");
  $("#res-again").onclick=()=>startSession();
}

/* ============ Words management ============ */
let wfilter="all";
$$("#wfilters .tab").forEach(t=>t.onclick=()=>{
  $$("#wfilters .tab").forEach(x=>x.classList.remove("on"));
  t.classList.add("on"); wfilter=t.dataset.f; renderWords();
});
$("#search").oninput=()=>renderWords();
function renderWords(){
  $("#words-count").textContent=`登録 ${state.words.length} 語 ／ 習得 ${masteredCount()} 語`;
  const q=$("#search").value.trim().toLowerCase();
  let list=state.words.filter(w=>{
    if(wfilter==="learning"&&!(w.level>=1&&w.level<4)) return false;
    if(wfilter==="mastered"&&w.level<4) return false;
    if(wfilter==="new"&&w.level!==0) return false;
    if(q&&!(w.word.toLowerCase().includes(q)||w.meaning.toLowerCase().includes(q))) return false;
    return true;
  });
  const lvName=l=>l>=4?["習得済み","lv4"]:l>=1?["学習中 Lv."+l,"lv"+l]:["未学習","lv0"];
  if(!list.length){$("#wlist").innerHTML=`<div class="empty"><i class="ti ti-search-off"></i>該当する単語がありません</div>`;return;}
  $("#wlist").innerHTML=list.slice(0,400).map(w=>{
    const [ln,lc]=lvName(w.level);
    return `<div class="witem">
      <div class="wt"><div class="we">${esc(w.word)}</div><div class="wm">${esc(w.meaning)}${w.note?" ・ "+esc(w.note):""}</div></div>
      <span class="lvbadge ${lc}">${ln}</span>
      <button class="wdel" data-w="${esc(w.word)}"><i class="ti ti-x"></i></button>
    </div>`;
  }).join("")+(list.length>400?`<div class="countnote">先頭400件を表示中（検索で絞り込めます）</div>`:"");
  $$("#wlist .wdel").forEach(b=>b.onclick=()=>delWord(b.dataset.w));
}
function delWord(word){
  if(!confirm(`「${word}」を削除しますか？`)) return;
  state.words=state.words.filter(w=>w.word!==word);
  state.words.forEach((w,i)=>w.idx=i);
  save(); renderWords(); toast("削除しました");
}
$("#add-fab").onclick=()=>{$("#in-word").value="";$("#in-mean").value="";$("#in-note").value="";$("#modal-add").classList.add("show");$("#in-word").focus();};
$("#add-cancel").onclick=()=>$("#modal-add").classList.remove("show");
$("#modal-add").onclick=e=>{if(e.target.id==="modal-add")$("#modal-add").classList.remove("show");};
$("#add-save").onclick=()=>{
  const word=$("#in-word").value.trim();
  const mean=$("#in-mean").value.trim();
  const note=$("#in-note").value.trim();
  if(!word||!mean){toast("英単語と日本語訳は必須です");return;}
  if(state.words.some(w=>w.word.toLowerCase()===word.toLowerCase())){toast("すでに登録済みです");return;}
  state.words.push({word,meaning:mean,note,level:0,nextReview:0,idx:state.words.length,example:"",tips:""});
  save(); $("#modal-add").classList.remove("show"); renderWords(); toast("追加しました");
};

/* ============ Progress ============ */
let calMonth=new Date();
function renderProgress(){
  renderProgressBlocks("#p-ov-bar","#p-ov-text","#p-sec-list");
  renderBadges("#prog-badges");
  renderStreakBadges();
  renderCalendar();
}
$("#cal-prev").onclick=()=>{calMonth.setMonth(calMonth.getMonth()-1);renderCalendar();};
$("#cal-next").onclick=()=>{calMonth.setMonth(calMonth.getMonth()+1);renderCalendar();};
function renderCalendar(){
  const y=calMonth.getFullYear(),m=calMonth.getMonth();
  $("#cal-month").textContent=`${y}.${pad(m+1)}`;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const todayK=dateKey(new Date());
  const dows=["日","月","火","水","木","金","土"];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join("");
  for(let i=0;i<first;i++) html+=`<div class="cal-cell empty"></div>`;
  // max count for shading
  for(let d=1;d<=days;d++){
    const key=`${y}-${pad(m+1)}-${pad(d)}`;
    const log=state.dailyLog[key];
    const done=log&&log.count>0;
    const isToday=key===todayK;
    let style="";
    if(done){
      const op=Math.min(1,0.3+log.count/40);
      style=`background:rgba(var(--primary-rgb),${op.toFixed(2)})`;
    }
    html+=`<div class="cal-cell ${done?"done":""} ${isToday?"today":""}" style="${style}">
      <div>${d}</div>${done?`<div class="cc">${log.count}</div>`:""}</div>`;
  }
  $("#cal-grid").innerHTML=html;
}

/* ============ Settings ============ */
function renderSettings(){
  $$("#seg-new button").forEach(b=>b.classList.toggle("on",+b.dataset.n===state.settings.newPerDay));
  $$("#seg-rev button").forEach(b=>b.classList.toggle("on",+b.dataset.n===(state.settings.reviewCap||0)));
  $("#colors").innerHTML=COLORS.map(c=>`<div class="col ${c.c===state.settings.primary?"on":""}" data-c="${c.c}" data-rgb="${c.rgb}" title="${c.n}" style="background:${c.c}"></div>`).join("");
  $$("#colors .col").forEach(el=>el.onclick=()=>{
    state.settings.primary=el.dataset.c; state.settings.primaryRgb=el.dataset.rgb;
    applyTheme(); save(); renderSettings();
  });
  $("#storage-note").textContent=lsOK
    ? "※ データはこのブラウザのlocalStorageに保存されます。キャッシュ削除で消えるため、定期的なエクスポートを推奨します。"
    : "⚠️ このプレビュー環境ではlocalStorageが使えず、記録は保持されません。HTMLファイルとして保存してブラウザで開くと正常に保存されます。";
}
$$("#seg-new button").forEach(b=>b.onclick=()=>{state.settings.newPerDay=+b.dataset.n;save();renderSettings();toast("新規単語数を変更しました");});
$$("#seg-rev button").forEach(b=>b.onclick=()=>{state.settings.reviewCap=+b.dataset.n;save();renderSettings();toast("復習上限を変更しました");});
$("#export-btn").onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`toeic-vocab-${dateKey(new Date())}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("エクスポートしました");
};
$("#reset-btn").onclick=()=>{
  if(!confirm("学習記録（習熟度・ログ）をすべてリセットします。単語データは残ります。よろしいですか？")) return;
  state.words.forEach(w=>{w.level=0;w.nextReview=0;});
  state.dailyLog={};
  state.phoenixStreak=0;
  save(); renderSettings(); toast("学習データをリセットしました");
};

/* ============ Init ============ */
load();
applyTheme();
renderHome();
</script>
